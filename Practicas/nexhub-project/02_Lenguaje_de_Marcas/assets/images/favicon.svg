<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="6" fill="#0d0f14"/>
  <!-- Hexágono relleno con color accent -->
  <polygon
    points="16,4 26,9.5 26,22.5 16,28 6,22.5 6,9.5"
    fill="#6c63ff"
    opacity="0.18"
  />
  <!-- Hexágono borde -->
  <polygon
    points="16,4 26,9.5 26,22.5 16,28 6,22.5 6,9.5"
    fill="none"
    stroke="#6c63ff"
    stroke-width="1.5"
  />
  <!-- N centrada -->
  <text
    x="16" y="21"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="13"
    font-weight="800"
    fill="#6c63ff"
    letter-spacing="-0.5"
  >N</text>
</svg>
